  @media (prefers-color-scheme:dark){.pin{border-color:#252320;} .homeicon svg{filter:drop-shadow(0 1px 1px rgba(0,0,0,.6));}}

  .mh b{font-weight:600;}
  .yes{color:#1d6b46;} .no{color:#8a2e25;} .ask{color:#8a887f;}
  .pop-note{margin-top:8px;font-size:11.5px;background:#fbeed6;color:#5a4410;border-radius:7px;padding:6px 8px;line-height:1.4;}
  .pop-note.bad{background:#f8e3e0;color:#8a2e25;}
  .legend{position:absolute;right:12px;bottom:20px;z-index:600;background:var(--panel);border:1px solid var(--line2);border-radius:9px;padding:9px 11px;font-size:11px;color:var(--muted);box-shadow:0 2px 10px rgba(0,0,0,.12);max-width:230px;}

const cycleLayer=L.layerGroup();
(function(){
  const cyc=getCSS('--cyc')||'#7c3aed';
  const casing={color:'#ffffff',weight:6,opacity:.5,lineCap:'round',lineJoin:'round',interactive:false};
  const offSty={color:cyc,weight:3.6,opacity:.95,lineCap:'round',lineJoin:'round'};
  const onSty={color:cyc,weight:3.4,opacity:.95,dashArray:'1 7',lineCap:'round'};
  (CYCLE_DATA.off||[]).concat(CYCLE_DATA.on||[]).forEach(function(w){L.polyline(w.c,casing).addTo(cycleLayer);});
  (CYCLE_DATA.off||[]).forEach(function(w){var p=L.polyline(w.c,offSty).addTo(cycleLayer);p.bindTooltip(w.n?w.n:'Shared path / cycleway',{sticky:true});});
  (CYCLE_DATA.on||[]).forEach(function(w){var p=L.polyline(w.c,onSty).addTo(cycleLayer);p.bindTooltip(w.n?(w.n+': on-road cycle lane'):'On-road cycle lane',{sticky:true});});
})();

// ---- icons ----
function houseSVG(color,furnished){
  const inner=furnished
    ? '<path d="M13 2.5 L23 11 L20.5 11 L20.5 22 L5.5 22 L5.5 11 L3 11 Z"/><rect x="10.5" y="14.5" width="5" height="7.5" fill="#ffffff" opacity="0.85" stroke="none"/>'
    : '<rect x="4.5" y="5.5" width="17" height="3" rx="0.6"/><path d="M6 8.5 L20 8.5 L20 22 L6 22 Z"/><rect x="8" y="11" width="3.4" height="3.4" fill="#ffffff" opacity="0.85" stroke="none"/><rect x="14.6" y="11" width="3.4" height="3.4" fill="#ffffff" opacity="0.85" stroke="none"/>';
  return '<div class="homeicon"><svg width="26" height="26" viewBox="0 0 26 26" fill="'+color+'" stroke="#ffffff" stroke-width="1.6" stroke-linejoin="round">'+inner+'</svg></div>';
}
function homeIcon(h){return L.divIcon({className:'',html:houseSVG(SUIT_COLORS[h.suit]||'#888',h.furnished),iconSize:[26,26],iconAnchor:[13,23],popupAnchor:[0,-21]});}
function dayIcon(d){return L.divIcon({className:'',html:'<div class="pin" style="background:'+DC_COLORS[d.os]+'"></div>',iconSize:[18,18],iconAnchor:[9,9],popupAnchor:[0,-8]});}
function listGlyph(kind,color,furnished){
  if(kind==='day') return '<span class="li-glyph"><span class="pin" style="width:13px;height:13px;background:'+color+';box-shadow:none"></span></span>';
  return '<span class="li-glyph">'+houseSVG(color,furnished).replace('width="26" height="26"','width="16" height="16"')+'</span>';
}

function esc(s){return (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function row(k,v){return v?'<div class="pop-row"><span class="k">'+k+'</span><span class="v">'+v+'</span></div>':"";}
function mh(label,state){const cls=state==='yes'?'yes':(state==='no'?'no':'ask');const mk=state==='yes'?'✓':(state==='no'?'✗':'?');return '<span class="mh '+cls+'"><b>'+mk+'</b> '+label+'</span>';}
function covBadge(c){const m={yes:['Covers our window','#e6f4ec','#1d6b46'],likely:['Term: confirm','#fbeed6','#7a4d0c'],no:['Does NOT cover window','#f8e3e0','#8a2e25']};const x=m[c]||m.likely;return '<span class="pop-badge" style="background:'+x[1]+';color:'+x[2]+'">'+x[0]+'</span>';}

function foodRow(d){
  if(!d.food_status)return"";
  var m={provided:['Lunches provided','#e6f4ec','#1d6b46'],partial:['Some food; still pack a lunch','#fbeed6','#7a4d0c'],byo:['Pack your own lunch','#f8e3e0','#8a2e25'],varies:['Varies by educator','#eceae3','#55534c'],unknown:['Unknown - confirm','#eceae3','#55534c']};
  var x=m[d.food_status]||m.unknown;
  var conf=d.food_conf?' <span style="color:#8a887f">('+esc(d.food_conf)+' conf.)</span>':'';
  var tip=d.food_note?' title="'+esc(d.food_note).replace(/"/g,'&quot;')+'"':'';
  return row('Lunches','<span class="pop-badge"'+tip+' style="background:'+x[1]+';color:'+x[2]+'">'+x[0]+'</span>'+conf);
}
function dayPopup(d){
  const rows=[row("Open?","<b>"+esc(d.sdates)+"</b>"),row("Ages",esc(d.ages)),
    row("2yo",esc(d.a2)),row("5yo",esc(d.a5)),row("Hours",esc(d.hours)),
    row("Fees",esc(d.feesu3)+" (under-3); "+esc(d.fees3)+" (3+)"),row("20 Hrs",esc(d.h20)),foodRow(d),
    row("ERO",esc(d.ero)),row("Google",esc(d.google)),row("Avail",esc(d.avail)),
    row("Phone",esc(d.ph)),row("Email",d.em?'<a href="mailto:'+esc(d.em)+'">'+esc(d.em)+'</a>':""),
    row("Web",d.web&&d.web!=="NF"?'<a href="'+esc(d.web)+'" target="_blank">'+esc(d.web)+'</a>':""),
    row("Ask",esc(d.action))].join("");
  const note=d.inreg==="No"?'<div class="pop-note">Not in the current Education Counts licensed register (Jun 2026), or registered outside the district. Verify it is operating.</div>':"";
  return '<div class="pop-name">'+esc(d.n)+'</div><div class="pop-badges">'+
    '<span class="pop-badge" style="background:'+BG[d.os]+';color:'+FG[d.os]+'">'+DC_LABELS[d.os]+'</span>'+
    '<span class="pop-badge" style="background:#eceae3;color:#55534c">'+esc(d.suburb)+'</span>'+
    '<span class="pop-badge" style="background:#eceae3;color:#55534c">'+esc(d.type)+'</span></div>'+rows+note+
    '<div class="pop-row"><span class="k"></span><span class="v"><a href="whangarei_daycare_table.html?dc='+encodeURIComponent(d.id)+'" target="_blank">View in table</a></span></div>';
}
function homePopup(h){
  const price=h.price!=null?("$"+h.price+"/wk"):"Price n/a";
  const checks='<div style="margin:6px 0 2px">'+mh("Parking",h.parking)+mh("Laundry",h.laundry)+mh("Outdoor",h.outdoor)+mh("Heating+insul",h.heating)+mh("Broadband",h.broadband)+'</div>';
  const adlink=h.url?'<a href="'+esc(h.url)+'" target="_blank">'+(h.url_kind==="search"?"Find on Trade Me":"View listing")+'</a>':esc(h.source||"");
  const rows=[row("Address",esc(h.address)+(h.approx?' <span class="ask">(approx location)</span>':"")),
    row("Rooms",(h.beds!=null?h.beds+" bed":"")+(h.baths!=null?", "+h.baths+" bath":"")),
    row("Type",h.furnished?"Furnished":"Unfurnished"+(h.furnish_note?" ("+esc(h.furnish_note)+")":"")),
    row("Avail",esc(h.avail)),row("Term",esc(h.term)),
    row("Max ten.",esc(h.maxten)+(h.maxten_flag?' <span class="no">(confirm sub-3 cap)</span>':"")),
    row("Bond",esc(h.bond)),row("Contact",esc(h.contact)),
    row("Phone",esc(h.phone)),row("Email",h.email?'<a href="mailto:'+esc(h.email)+'">'+esc(h.email)+'</a>':""),
    row("Listing",adlink)].join("");
  const flag=h.s45?'<div class="pop-note'+(h.suit==='unsuitable'?' bad':'')+'">'+esc(h.s45)+'</div>':"";
  return '<div class="pop-name">'+price+' &middot; '+esc(h.suburb)+'</div><div class="pop-badges">'+
    '<span class="pop-badge" style="background:'+BG[h.suit]+';color:'+FG[h.suit]+'">'+SUIT_LABELS[h.suit]+'</span>'+
    '<span class="pop-badge" style="background:#eceae3;color:#55534c">'+(h.furnished?"Furnished":"Unfurnished")+'</span>'+
    covBadge(h.covers)+'</div>'+checks+rows+flag+
    '<div class="pop-row"><span class="k"></span><span class="v"><a href="whangarei_table.html?home='+encodeURIComponent(h.id)+'" target="_blank">View in table</a></span></div>';
}

// ---- build markers + list ----
const dMarkers={},hMarkers={};
const listEl=document.getElementById('list');
function buildList(){
  listEl.innerHTML="";
  const dh=document.createElement('div');dh.className='grouphd';dh.id='hd-day';listEl.appendChild(dh);
  DAYS.slice().sort((a,b)=>a.n.localeCompare(b.n)).forEach(d=>{
    const li=document.createElement('div');li.className='li';li.dataset.kind='day';li.dataset.id=d.id;
    li.innerHTML='<div class="li-top">'+listGlyph('day',DC_COLORS[d.os])+'<span class="li-name">'+esc(d.n)+'</span></div>'+
      '<div class="li-meta">'+esc(d.suburb)+' &middot; '+esc(d.type)+'</div>';
    li.addEventListener('click',()=>select('day',d.id,true));listEl.appendChild(li);
  });
  const hh=document.createElement('div');hh.className='grouphd';hh.id='hd-home';listEl.appendChild(hh);
  HOMES.slice().sort((a,b)=>(a.price||1e9)-(b.price||1e9)).forEach(h=>{
    const li=document.createElement('div');li.className='li';li.dataset.kind='home';li.dataset.id=h.id;
    li.innerHTML='<div class="li-top">'+listGlyph('home',SUIT_COLORS[h.suit],h.furnished)+'<span class="li-name">'+(h.price!=null?'$'+h.price:'n/a')+' &middot; '+esc(h.address)+'</span></div>'+
      '<div class="li-meta">'+esc(h.suburb)+' &middot; '+(h.furnished?'Furnished':'Unfurnished')+' &middot; '+esc(SUIT_LABELS[h.suit])+'</div>';
    li.addEventListener('click',()=>select('home',h.id,true));listEl.appendChild(li);
  });
}
DAYS.forEach(d=>{const m=L.marker([d.lat,d.lng],{icon:dayIcon(d)}).bindPopup(dayPopup(d),{closeButton:true});m.on('click',()=>select('day',d.id,false));dMarkers[d.id]=m;});
HOMES.forEach(h=>{const m=L.marker([h.lat,h.lng],{icon:homeIcon(h)}).bindPopup(homePopup(h),{closeButton:true});m.on('click',()=>select('home',h.id,false));hMarkers[h.id]=m;});

const types=[...new Set(DAYS.map(d=>d.type))].sort();
const tf=document.getElementById('typeF');types.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;tf.appendChild(o);});

// ---- state + filters ----
let S={homes:true,days:true,os:"all",type:"all",suit:"all"};
function homeShown(h){if(!S.homes)return false;if(S.suit!=="all"&&h.suit!==S.suit)return false;return true;}
function dayShown(d){if(!S.days)return false;if(S.os!=="all"&&d.os!==S.os)return false;if(S.type!=="all"&&d.type!==S.type)return false;return true;}
function applyFilters(){
  let nd=0,nh=0;
  DAYS.forEach(d=>{const ok=dayShown(d);const m=dMarkers[d.id];if(ok){if(!map.hasLayer(m))m.addTo(map);nd++;}else if(map.hasLayer(m))map.removeLayer(m);
    const li=listEl.querySelector('.li[data-kind="day"][data-id="'+CSS.escape(d.id)+'"]');if(li)li.classList.toggle('hide',!ok);});
  HOMES.forEach(h=>{const ok=homeShown(h);const m=hMarkers[h.id];if(ok){if(!map.hasLayer(m))m.addTo(map);nh++;}else if(map.hasLayer(m))map.removeLayer(m);
    const li=listEl.querySelector('.li[data-kind="home"][data-id="'+CSS.escape(h.id)+'"]');if(li)li.classList.toggle('hide',!ok);});
  document.getElementById('hd-day').textContent="Daycares ("+nd+")";
  document.getElementById('hd-home').textContent="Homes ("+nh+")";
  const c=META.counts||{};
  document.getElementById('sub').textContent=
    nh+" homes and "+nd+" daycares shown. Catalogue: "+(c.homes||HOMES.length)+" homes ("+(c.furnished||0)+" furnished), "+(c.daycares||DAYS.length)+" ECE services ("+(c.daycares_open_summer||0)+" open through summer). Data generated "+(META.generated||"")+".";
}

let sel=null;
function select(kind,id,fly){
  sel=kind+":"+id;
  listEl.querySelectorAll('.li').forEach(x=>x.classList.toggle('sel',x.dataset.kind===kind&&x.dataset.id===id));
  const obj=kind==='day'?Dby[id]:Hby[id];if(!obj)return;
  const m=kind==='day'?dMarkers[id]:hMarkers[id];
  if(!map.hasLayer(m))m.addTo(map);
  if(fly)map.flyTo([obj.lat,obj.lng],16,{duration:.6});
  m.openPopup();
  const el=listEl.querySelector('.li[data-kind="'+kind+'"][data-id="'+CSS.escape(id)+'"]');if(el)el.scrollIntoView({block:'nearest',behavior:'smooth'});
}

// ---- legend ----
document.getElementById('legend').innerHTML=
  '<div class="h">Homes (shape = type, colour = suitability)</div>'+
  '<div class="row">'+houseSVG(getCSS('--green'),true).replace('width="26" height="26"','width="15" height="15"')+' House = furnished</div>'+
  '<div class="row">'+houseSVG(getCSS('--green'),false).replace('width="26" height="26"','width="15" height="15"')+' Box = unfurnished</div>'+
  '<div class="row"><span class="dot" style="background:var(--green)"></span>Viable &nbsp; <span class="dot" style="background:var(--orange)"></span>Undecided &nbsp; <span class="dot" style="background:var(--red)"></span>Unsuitable</div>'+
  '<div class="h">Daycares (circles)</div>'+
  '<div class="row"><span class="dot" style="background:var(--green)"></span>Open through summer</div>'+
  '<div class="row"><span class="dot" style="background:var(--red)"></span>Closed part of summer</div>'+
  '<div class="row"><span class="dot" style="background:var(--orange)"></span>Confirm summer</div>'+
  '<div class="row"><span class="dot" style="background:var(--grey)"></span>Not applicable</div>'+
  '<div id="cycLegend" style="display:none">'+
  '<div class="h">Cycle routes</div>'+
  '<div class="row"><span style="display:inline-block;width:18px;height:0;border-top:3px solid var(--cyc);vertical-align:middle"></span>&nbsp;Shared path / cycleway</div>'+
  '<div class="row"><span style="display:inline-block;width:18px;height:0;border-top:3px dashed var(--cyc);vertical-align:middle"></span>&nbsp;On-road cycle lane</div>'+
  '</div>'+
  '<div class="cl">Click a marker or list row for detail. Each popup links to the matching table row.</div>';

// ---- wire controls ----
function chipToggle(btn){btn.classList.toggle('on');}
document.getElementById('tgHomes').addEventListener('click',e=>{S.homes=!S.homes;chipToggle(e.target);applyFilters();});
document.getElementById('tgDays').addEventListener('click',e=>{S.days=!S.days;chipToggle(e.target);applyFilters();});
document.getElementById('controls').addEventListener('click',e=>{const b=e.target.closest('.chip[data-os]');if(!b)return;S.os=b.dataset.os;document.querySelectorAll('.chip[data-os]').forEach(x=>x.classList.toggle('on',x===b));applyFilters();});
document.getElementById('typeF').addEventListener('change',e=>{S.type=e.target.value;applyFilters();});
document.getElementById('suitF').addEventListener('change',e=>{S.suit=e.target.value;applyFilters();});
document.getElementById('tgBorder').addEventListener('click',e=>{chipToggle(e.target);if(map.hasLayer(borderLayer))map.removeLayer(borderLayer);else borderLayer.addTo(map);});
document.getElementById('tgSat').addEventListener('click',e=>{chipToggle(e.target);if(map.hasLayer(sat)){map.removeLayer(sat);osm.addTo(map);}else{osm.remove();sat.addTo(map);}});
document.getElementById('tgCycle').addEventListener('click',e=>{chipToggle(e.target);if(map.hasLayer(cycleLayer)){map.removeLayer(cycleLayer);}else{cycleLayer.addTo(map);}var cl=document.getElementById('cycLegend');if(cl)cl.style.display=map.hasLayer(cycleLayer)?'block':'none';});

// ---- init ----
buildList();applyFilters();
(function(){const q=new URLSearchParams(location.search);const hid=q.get('home');const did=q.get('day');
  if(hid&&Hby[hid])setTimeout(()=>select('home',hid,true),250);
  else if(did&&Dby[did])setTimeout(()=>select('day',did,true),250);})();
</script>
